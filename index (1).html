<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#7c3f91"><title>Body · Frever Fitness</title><link rel="stylesheet" href="/css/styles.css?v=6.0.0"></head><body>
<header class="app-header"><div class="brand-row"><a class="logo" href="/home/" aria-label="Frever Fitness home">🐼</a><div class="brand"><h1>Frever Fitness</h1><p>Workouts, routines, PBs and body tracking</p></div><span class="user-pill" data-user-email>Signed in</span></div></header>
<nav class="top-nav"><div class="nav-inner"><a class="nav-link " href="/home/">🏠 Home</a><a class="nav-link " href="/workout/">🏋️ Workout</a><a class="nav-link " href="/routines/">📋 Routines</a><a class="nav-link " href="/history/">🕘 History</a><a class="nav-link " href="/pbs/">🏆 PBs</a><a class="nav-link active" href="/body/">📏 Body</a><a class="nav-link " href="/meals/">🍽️ Meals</a><a class="nav-link " href="/exercises/">📚 Exercises</a><a class="nav-link " href="/settings/">⚙️ Settings</a></div></nav><main><div class="page-head"><h2>Body tracking</h2></div><section id="bodySummary" class="grid tiles"></section><section class="card"><div class="toolbar"><button id="addWeightBtn" class="primary">+ Add weight</button><button id="addMeasureBtn" class="secondary">+ Add measurements</button><button id="historyBtn" class="ghost">History</button></div></section><section class="card"><div class="row between"><h3>Progress graph</h3><select id="chartMetric" style="width:auto"><option value="weight">Weight</option><option value="waist">Waist</option><option value="hips">Hips</option><option value="chest">Chest</option><option value="leftArm">Left arm</option><option value="rightArm">Right arm</option><option value="leftLeg">Left leg</option><option value="rightLeg">Right leg</option></select></div><div class="canvas-wrap"><canvas id="bodyChart"></canvas></div></section><section class="card"><h3>Progress photos</h3><div class="photo-placeholder">Photo timeline is prepared for Firebase Storage in a future update.</div></section><dialog id="bodyDialog" class="modal"><form method="dialog" class="modal-body"><div class="row between"><h3 id="bodyDialogTitle">Add entry</h3><button value="cancel" class="ghost small">Close</button></div><input id="bodyType" type="hidden"><label>Date<input id="bodyDate" type="date"></label><div id="weightFields"><label>Weight<input id="bodyWeight" inputmode="decimal"></label></div><div id="measureFields" class="hidden grid" style="grid-template-columns:1fr 1fr"><label>Waist<input id="waist" inputmode="decimal"></label><label>Hips<input id="hips" inputmode="decimal"></label><label>Chest<input id="chest" inputmode="decimal"></label><label>Left arm<input id="leftArm" inputmode="decimal"></label><label>Right arm<input id="rightArm" inputmode="decimal"></label><label>Left leg<input id="leftLeg" inputmode="decimal"></label><label>Right leg<input id="rightLeg" inputmode="decimal"></label></div><button id="saveBodyEntry" value="default" class="primary">Save entry</button></form></dialog><dialog id="bodyHistoryDialog" class="modal"><div class="modal-body"><div class="row between"><h3>Body history</h3><button id="closeBodyHistory" class="ghost small">Close</button></div><div id="bodyHistoryList" class="list"></div></div></dialog></main><script type="module" src="/js/body.js?v=6.0.0"></script></body></html>
